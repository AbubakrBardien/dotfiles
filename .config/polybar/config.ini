[global/wm]
include-file = ~/.config/polybar/themes/mocha.ini

[bar/status_bar]
bottom=true

width = 100%
; height = 24pt
height = 26pt
radius = 12

; dpi = 96

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

border-size = 2pt
border-color = ${colors.surface0}

padding-left = 2
padding-right = 2

module-margin = 2

separator = |
separator-foreground = ${colors.surface2}

font-0 = Source Code Pro Nerd Font:size=12
font-1 = 0xProto Nerd Font:size=14

;-----------------------------------------
modules-left = updates-pacman-aurhelper system-bluetooth-bluetoothctl
modules-center = i3 
modules-right = storage battery pulseaudio wlan eth date systray
;-----------------------------------------

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/i3]
type = internal/i3

enable-scroll = false

format = <label-state> <label-mode>

label-focused = %index%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.surface0}
label-focused-padding = 4

label-unfocused = %index%
label-unfocused-padding = 4

label-urgent = %index%
label-urgent-foreground = #000000
label-urgent-background = ${colors.red}
label-urgent-padding = 4

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
; format-volume-prefix-foreground = ${colors.blue}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.surface0}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d %b %Y %H:%M:%S

label = %date%
; label-foreground = ${colors.blue}

;---------------------------------------

[module/battery]
type= internal/battery
low-at = 15
battery = BAT

[module/updates-pacman-aurhelper]
type = custom/script
exec = ~/.config/polybar/extra_modules/updates-pacman-aurhelper.sh
interval = 600

[module/system-bluetooth-bluetoothctl]
type = custom/script
exec = ~/.config/polybar/extra_modules/system-bluetooth-bluetoothctl.sh
tail = true
click-left = ~/.config/polybar/extra_modules/system-bluetooth-bluetoothctl.sh --toggle &

[module/storage]
type = custom/ipc
interval = 600

hook-0 = echo $(df -h / --output="used" | awk "NR==2") used of $(df -h / --output="size" | awk "NR==2")
hook-1 = ~/.config/polybar/my_scripts/storage_format_1.sh

initial = 1

click-left = "#storage.hook.0"
click-right = "#storage.hook.1"

; label-foreground = ${colors.blue}

;---------------------------------------

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
