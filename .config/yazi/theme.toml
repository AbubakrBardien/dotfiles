# My own theme based on "onedark.yazi" (https://github.com/BennyOe/onedark.yazi)

[manager]
cwd = { fg = "#61AFEF" }

# Hovered
hovered = { bg = "#282C34", italic = true }
preview_hovered = { bg = "#282C34" }

# Border
border_symbol = "Ôöé"
border_style = { fg = "#282C34" }

# Marker
marker_copied = { fg = "#98C379", bg = "#98C379" }  
marker_cut = { fg = "#E06C75", bg = "#E06C75" }
marker_marked = { fg = "#C678DD" }  
marker_selected = { fg = "#E5C07B" }

# Count
count_copied = { fg = "#98C379", bg = "#282C34" }
count_cut = { fg = "#E06C75", bg = "#282C34" }
count_selected = { fg = "#E5C07B", bg = "#282C34" }

[mode]

# Normal Mode
normal_main = { fg = "#3a3f42", bg = "#64a4d9", bold = true }
normal_alt = { fg = "#64a4d9", bg = "#3a3f42", bold = true }

# Select Mode
select_main = { fg = "#3a3f42", bg = "#C678DD", bold = true }
select_alt = { fg = "#C678DD", bg = "#3a3f42", bold = true }

# Unset Mode
unset_main = { fg = "#3a3f42", bg = "#61AFEF", bold = true }
unset_alt = { fg = "#61AFEF", bg = "#3a3f42", bold = true }

[status]
sep_left  = { open = "¯é▓", close = "¯é░" }
sep_right  = { open = "¯é▓", close = "¯é░" } 

# Permissions
perm_type = { fg = "#61AFEF", bold = true }
perm_read = { fg = "#98C379" }
perm_write = { fg = "#E5C07B" }
perm_exec = { fg = "#E06C75" }
perm_sep = { fg = "#707a80" }

# Progress
progress_label = { fg = "#3a3f42", bold = true }
progress_normal = { fg = "#98C379", bg = "#282C34" }
progress_error = { fg = "#E06C75", bg = "#282C34" } 

# Hints (generated when pressing "g" for example)
[which]
mask = { bg = "#282C34" }
cand = { fg = "#98C379" }
rest = { fg = "#ABB2BF" }
desc = { fg = "#E5C07B" }
separator = " ¯¬£ "
separator_style = { fg = "#ABB2BF" }

[help]
on = { fg = "#98C379" }
run = { fg = "#E5C07B" }
hovered = { reversed = true, bold = true }
footer = { fg = "#ABB2BF", bg = "#000000" }

[notify]
title_info = { fg = "#98C379" }
title_warn = { fg = "#E06C75" }
title_error = { fg = "#E5C07B" }

[filetype]

rules = [
	# Images
	{ name = "*.jpeg", fg = "#d6d67e" },
	{ name = "*.jpg", fg = "#d6d67e" },
	{ name = "*.png", fg = "#d6d67e" },
	{ name = "*.webp", fg = "#d6d67e" },

	# Videos
	{ name = "*.avi", fg = "#edaa64" },
	{ name = "*.mkv", fg = "#edaa64" },
	{ name = "*.mp4", fg = "#edaa64" },
	{ name = "*.webm", fg = "#edaa64" },

	# Gifs
	{ name = "*.gif", fg = "#d6bb72" },

	# Documents
	{ name = "*.docx", fg = "#D2B48C"},
	{ name = "*.pdf", fg = "#D2B48C" },
	{ name = "*.xlsx", fg = "#D2B48C"},

	# Executables
	{ name = "*", is = "exec", fg = "#98C379" },

	# Symbolic Links
	{ name = "*", is = "link", fg = "#6ac1c4" },

    # Fallback
    { name = "*", fg = "#bcc5d4" },
    { name = "*/", fg = "#61AFEF" },
]

